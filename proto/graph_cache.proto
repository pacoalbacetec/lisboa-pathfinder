syntax = "proto3";

package lisboa;

message LatLon {
        int64 lat = 1;
        int64 lon = 2;
    }

message Node {
    int64 id = 1;
    LatLon coords = 2;
}
message Edge {
    int64 id  = 1;
    string type = 2;
}

message EdgeList {
    repeated Edge edges = 1;
}
message CachedGraph {
    map<int64,Node> nodes = 1;
    map<int64,EdgeList> adjacency_list = 2;

}